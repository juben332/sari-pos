<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions — Sari POS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar">
    <div class="sidebar__brand">🛒 Sari POS</div>
    <nav class="sidebar__nav">
      <a href="/dashboard.html"    class="sidebar__link" data-page="dashboard"><span class="icon">🏠</span> Dashboard</a>
      <a href="/pos.html"          class="sidebar__link" data-page="pos"><span class="icon">🏪</span> POS / Sales</a>
      <a href="/returns.html"      class="sidebar__link" data-page="returns"><span class="icon">↩️</span> Returns</a>
      <a href="/transactions.html" class="sidebar__link" data-page="transactions"><span class="icon">📋</span> Transactions</a>
      <div data-admin hidden>
        <div class="sidebar__divider">Admin</div>
        <a href="/inventory.html"       class="sidebar__link" data-page="inventory"><span class="icon">📦</span> Inventory</a>
        <a href="/categories.html"      class="sidebar__link" data-page="categories"><span class="icon">🏷️</span> Categories</a>
        <a href="/stock-movements.html" class="sidebar__link" data-page="stock-movements"><span class="icon">📈</span> Stock History</a>
        <a href="/reports.html"         class="sidebar__link" data-page="reports"><span class="icon">📊</span> Reports</a>
        <a href="/staff.html"           class="sidebar__link" data-page="staff"><span class="icon">👥</span> Staff</a>
      </div>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user" data-user-name></div>
      <div data-user-role style="font-size:0.75rem;"></div>
      <button id="logout-btn" class="btn btn--outline btn--sm" style="margin-top:10px;width:100%;">Logout</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="topbar__menu-btn" id="sidebar-toggle">☰</button>
      <span class="topbar__title">Transactions</span>
    </div>
    <div class="content">
      <div class="page-header">
        <h1 class="page-title">Transaction History</h1>
      </div>
      <div class="search-bar">
        <input type="text" id="ref-search" class="form-control" placeholder="Search ref # e.g. TXN-..." style="max-width:210px;" />
        <input type="date" id="from-date" class="form-control" style="max-width:155px;" />
        <input type="date" id="to-date" class="form-control" style="max-width:155px;" />
        <button class="btn btn--outline" id="filter-btn">Filter</button>
        <button class="btn btn--outline" id="reset-btn">Reset</button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Date</th><th>Ref #</th><th>Cashier</th><th>Subtotal</th><th>Discount</th><th>Total</th><th>Cash</th><th>Change</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="txn-tbody"><tr><td colspan="10" class="empty-state">Loading...</td></tr></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-backdrop" id="detail-modal" hidden>
  <div class="modal" style="max-width:560px;">
    <div class="modal__header">
      <span class="modal__title">Transaction Detail</span>
      <button class="modal__close" id="close-detail">✕</button>
    </div>
    <div id="detail-body"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
      <button class="btn btn--danger" id="void-btn" hidden>Void Transaction</button>
      <button class="btn btn--outline" id="close-detail2">Close</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  const user = requireAuth();
  initSidebar('transactions');

  let page = 1;
  let currentTxnId = null;

  async function load() {
    const from   = document.getElementById('from-date').value;
    const to     = document.getElementById('to-date').value;
    const refNo  = document.getElementById('ref-search').value.trim();
    const params = new URLSearchParams({ page, limit: 30 });
    if (from)  params.set('from', from + 'T00:00:00');
    if (to)    params.set('to', to + 'T23:59:59');
    if (refNo) params.set('reference_no', refNo);

    const res = await apiFetch(`/transactions?${params}`).catch(() => ({ data: [], total: 0 }));
    const tbody = document.getElementById('txn-tbody');

    if (!res.data.length) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty-state">No transactions found</td></tr>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    tbody.innerHTML = res.data.map(t => `
      <tr>
        <td>${new Date(t.created_at).toLocaleString()}</td>
        <td><code>${t.reference_no}</code></td>
        <td>${t.profiles?.full_name || '—'}</td>
        <td>₱${parseFloat(t.subtotal).toFixed(2)}</td>
        <td>${t.discount_type !== 'none' ? `${t.discount_type} (-₱${parseFloat(t.discount_amount).toFixed(2)})` : '—'}</td>
        <td><strong>₱${parseFloat(t.total).toFixed(2)}</strong></td>
        <td>₱${parseFloat(t.cash_tendered).toFixed(2)}</td>
        <td>₱${parseFloat(t.change_due).toFixed(2)}</td>
        <td><span class="badge ${t.status === 'completed' ? 'badge--green' : 'badge--red'}">${t.status}</span></td>
        <td><button class="btn btn--outline btn--sm" data-txn-id="${t.id}">View</button></td>
      </tr>
    `).join('');

    tbody.querySelectorAll('button[data-txn-id]').forEach(btn => {
      btn.addEventListener('click', () => openDetail(btn.dataset.txnId));
    });

    renderPagination(Math.ceil(res.total / 30));
  }

  function renderPagination(totalPages) {
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    if (totalPages <= 1) return;

    const pages = buildPageList(page, totalPages);
    pages.forEach(p => {
      const btn = document.createElement('button');
      if (p === '...') {
        btn.className = 'page-btn page-btn--dots';
        btn.textContent = '…';
        btn.disabled = true;
      } else {
        btn.className = `page-btn ${p === page ? 'active' : ''}`;
        btn.textContent = p;
        btn.addEventListener('click', () => { page = p; load(); });
      }
      pg.appendChild(btn);
    });
  }

  function buildPageList(current, total) {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    const pages = [];
    pages.push(1);
    if (current > 3) pages.push('...');
    for (let i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) pages.push(i);
    if (current < total - 2) pages.push('...');
    pages.push(total);
    return pages;
  }

  async function openDetail(id) {
    currentTxnId = id;
    const txn = await apiFetch(`/transactions/${id}`).catch(() => null);
    if (!txn) return;
    const el = document.getElementById('detail-body');
    el.innerHTML = `
      <p><strong>Ref:</strong> ${txn.reference_no}</p>
      <p><strong>Date:</strong> ${new Date(txn.created_at).toLocaleString()}</p>
      <p><strong>Cashier:</strong> ${txn.profiles?.full_name || '—'}</p>
      <p><strong>Discount:</strong> ${txn.discount_type}</p>
      <hr style="margin:12px 0;" />
      <table style="width:100%;font-size:0.85rem;">
        <thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Total</th></tr></thead>
        <tbody>${(txn.transaction_items || []).map(i => `
          <tr><td>${i.product_name}</td><td>${i.quantity}</td><td>₱${parseFloat(i.unit_price).toFixed(2)}</td><td>₱${parseFloat(i.subtotal).toFixed(2)}</td></tr>
        `).join('')}</tbody>
      </table>
      <div style="margin-top:12px;text-align:right;">
        <strong>Total: ₱${parseFloat(txn.total).toFixed(2)}</strong>
      </div>
    `;

    const voidBtn = document.getElementById('void-btn');
    if (user.role === 'admin' && txn.status === 'completed') {
      voidBtn.removeAttribute('hidden');
    } else {
      voidBtn.setAttribute('hidden', '');
    }

    document.getElementById('detail-modal').removeAttribute('hidden');
  }

  function closeDetail() { document.getElementById('detail-modal').setAttribute('hidden', ''); }

  document.getElementById('void-btn').addEventListener('click', async () => {
    if (!confirm('Void this transaction? Stock will be restored.')) return;
    try {
      await apiFetch(`/transactions/${currentTxnId}/void`, { method: 'PATCH' });
      closeDetail();
      load();
      toast('Transaction voided', 'success');
    } catch (err) { toast(err.message, 'error'); }
  });

  ['close-detail','close-detail2'].forEach(id => {
    document.getElementById(id).addEventListener('click', closeDetail);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !document.getElementById('detail-modal').hidden) closeDetail();
  });

  document.getElementById('filter-btn').addEventListener('click', () => { page = 1; load(); });
  document.getElementById('reset-btn').addEventListener('click', () => {
    document.getElementById('ref-search').value = '';
    document.getElementById('from-date').value = '';
    document.getElementById('to-date').value = '';
    page = 1; load();
  });

  // Search on Enter key
  document.getElementById('ref-search').addEventListener('keydown', e => {
    if (e.key === 'Enter') { page = 1; load(); }
  });

  load();
</script>
</body>
</html>
