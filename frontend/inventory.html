<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory — Sari POS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar">
    <div class="sidebar__brand"><i data-lucide="store"></i> Sari POS</div>
    <nav class="sidebar__nav">
      <a href="/dashboard.html"    class="sidebar__link" data-page="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a href="/pos.html"          class="sidebar__link" data-page="pos"><i data-lucide="shopping-cart"></i> POS / Sales</a>
      <a href="/returns.html"      class="sidebar__link" data-page="returns"><i data-lucide="corner-up-left"></i> Returns</a>
      <a href="/transactions.html" class="sidebar__link" data-page="transactions"><i data-lucide="clipboard-list"></i> Transactions</a>
      <div data-admin hidden>
        <div class="sidebar__divider">Admin</div>
        <a href="/inventory.html"       class="sidebar__link" data-page="inventory"><i data-lucide="package"></i> Inventory</a>
        <a href="/categories.html"      class="sidebar__link" data-page="categories"><i data-lucide="tag"></i> Categories</a>
        <a href="/stock-movements.html" class="sidebar__link" data-page="stock-movements"><i data-lucide="trending-up"></i> Stock History</a>
        <a href="/reports.html"         class="sidebar__link" data-page="reports"><i data-lucide="bar-chart-2"></i> Reports</a>
        <a href="/staff.html"           class="sidebar__link" data-page="staff"><i data-lucide="users"></i> Staff</a>
      </div>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user" data-user-name></div>
      <div data-user-role style="font-size:0.75rem;"></div>
      <button id="logout-btn" class="btn btn--outline btn--sm" style="margin-top:10px;width:100%;">Logout</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="topbar__menu-btn" id="sidebar-toggle"><i data-lucide="menu"></i></button>
      <span class="topbar__title">Inventory</span>
    </div>
    <div class="content">
      <div class="page-header">
        <h1 class="page-title">Products</h1>
        <div style="display:flex;gap:8px;">
          <button class="btn btn--outline" id="low-stock-btn">⚠️ Low Stock</button>
          <button class="btn btn--primary" id="add-product-btn">+ Add Product</button>
        </div>
      </div>

      <div class="search-bar">
        <input type="text" id="search" class="form-control" placeholder="Search products..." />
        <select id="category-filter" class="form-control" style="max-width:160px;">
          <option value="">All Categories</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th><th>Category</th><th>Barcode</th>
                <th>Price</th><th>Cost</th><th>Stock</th><th>Threshold</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="product-tbody">
              <tr><td colspan="8" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal-backdrop" id="product-modal" hidden>
  <div class="modal">
    <div class="modal__header">
      <span class="modal__title" id="modal-title">Add Product</span>
      <button class="modal__close" id="close-modal">✕</button>
    </div>
    <form id="product-form">
      <input type="hidden" id="product-id" />
      <div class="form-group">
        <label class="form-label">Name *</label>
        <input type="text" id="prod-name" class="form-control" required />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Price (₱) *</label>
          <input type="number" id="prod-price" class="form-control" min="0" step="0.01" required />
        </div>
        <div class="form-group">
          <label class="form-label">Cost Price (₱)</label>
          <input type="number" id="prod-cost" class="form-control" min="0" step="0.01" value="0" />
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Stock</label>
          <input type="number" id="prod-stock" class="form-control" min="0" value="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Low Stock Alert</label>
          <input type="number" id="prod-threshold" class="form-control" min="0" value="10" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="prod-category" class="form-control">
          <option value="">None</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Barcode</label>
        <input type="text" id="prod-barcode" class="form-control" />
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button type="button" class="btn btn--outline" id="cancel-modal">Cancel</button>
        <button type="submit" class="btn btn--primary">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Restock Modal -->
<div class="modal-backdrop" id="restock-modal" hidden>
  <div class="modal" style="max-width:360px;">
    <div class="modal__header">
      <span class="modal__title">Adjust Stock</span>
      <button class="modal__close" id="close-restock">✕</button>
    </div>
    <div id="restock-product-name" style="font-weight:600;margin-bottom:16px;"></div>
    <input type="hidden" id="restock-product-id" />
    <div class="form-group">
      <label class="form-label">New Stock Quantity</label>
      <input type="number" id="restock-qty" class="form-control" min="0" />
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn--outline" id="cancel-restock">Cancel</button>
      <button class="btn btn--primary" id="save-restock">Save</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  lucide.createIcons();
  requireAuth('admin');
  initSidebar('inventory');

  let categories = [];
  let showLowStockOnly = false;
  const productMap = new Map();

  async function loadCategories() {
    categories = await apiFetch('/categories').catch(() => []);
    const sel = document.getElementById('category-filter');
    const formSel = document.getElementById('prod-category');
    categories.forEach(c => {
      [sel, formSel].forEach(s => {
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.name;
        s.appendChild(opt);
      });
    });
  }

  async function loadProducts() {
    const search = document.getElementById('search').value.trim();
    const catId  = document.getElementById('category-filter').value;
    const params = new URLSearchParams();
    if (search) params.set('search', search);
    if (catId)  params.set('category_id', catId);

    let data = await apiFetch(`/products?${params}`).catch(() => []);
    if (showLowStockOnly) data = data.filter(p => p.stock <= p.low_stock_threshold);

    productMap.clear();
    data.forEach(p => productMap.set(p.id, p));

    const tbody = document.getElementById('product-tbody');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No products found</td></tr>'; return; }

    tbody.innerHTML = data.map(p => `
      <tr>
        <td><strong>${p.name}</strong></td>
        <td>${p.categories?.name || '—'}</td>
        <td>${p.barcode || '—'}</td>
        <td>₱${parseFloat(p.price).toFixed(2)}</td>
        <td>₱${parseFloat(p.cost_price).toFixed(2)}</td>
        <td>
          <span class="badge ${p.stock === 0 ? 'badge--red' : p.stock <= p.low_stock_threshold ? 'badge--amber' : 'badge--green'}">${p.stock}</span>
        </td>
        <td>${p.low_stock_threshold}</td>
        <td>
          <button class="btn btn--outline btn--sm" data-action="edit" data-id="${p.id}">Edit</button>
          <button class="btn btn--outline btn--sm" data-action="stock" data-id="${p.id}">Stock</button>
          <button class="btn btn--danger btn--sm" data-action="delete" data-id="${p.id}">Delete</button>
        </td>
      </tr>
    `).join('');

    tbody.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = productMap.get(btn.dataset.id);
        if (!p) return;
        if (btn.dataset.action === 'edit') openEditModal(p);
        else if (btn.dataset.action === 'stock') openRestock(p.id, p.name, p.stock);
        else if (btn.dataset.action === 'delete') deleteProduct(p.id);
      });
    });
  }

  // Product modal
  document.getElementById('add-product-btn').addEventListener('click', () => {
    document.getElementById('modal-title').textContent = 'Add Product';
    document.getElementById('product-form').reset();
    document.getElementById('product-id').value = '';
    document.getElementById('product-modal').removeAttribute('hidden');
  });

  function openEditModal(p) {
    document.getElementById('modal-title').textContent = 'Edit Product';
    document.getElementById('product-id').value = p.id;
    document.getElementById('prod-name').value = p.name;
    document.getElementById('prod-price').value = p.price;
    document.getElementById('prod-cost').value = p.cost_price;
    document.getElementById('prod-stock').value = p.stock;
    document.getElementById('prod-threshold').value = p.low_stock_threshold;
    document.getElementById('prod-category').value = p.category_id || '';
    document.getElementById('prod-barcode').value = p.barcode || '';
    document.getElementById('product-modal').removeAttribute('hidden');
  }

  function closeProductModal() { document.getElementById('product-modal').setAttribute('hidden',''); }
  function closeRestockModal() { document.getElementById('restock-modal').setAttribute('hidden',''); }

  ['close-modal','cancel-modal'].forEach(id => {
    document.getElementById(id).addEventListener('click', closeProductModal);
  });

  ['close-restock','cancel-restock'].forEach(id => {
    document.getElementById(id).addEventListener('click', closeRestockModal);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (!document.getElementById('product-modal').hidden) closeProductModal();
    if (!document.getElementById('restock-modal').hidden) closeRestockModal();
  });

  document.getElementById('product-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('product-id').value;
    const body = {
      name: document.getElementById('prod-name').value,
      price: parseFloat(document.getElementById('prod-price').value),
      cost_price: parseFloat(document.getElementById('prod-cost').value),
      stock: parseInt(document.getElementById('prod-stock').value),
      low_stock_threshold: parseInt(document.getElementById('prod-threshold').value),
      category_id: document.getElementById('prod-category').value || null,
      barcode: document.getElementById('prod-barcode').value || null,
    };
    try {
      if (id) await apiFetch(`/products/${id}`, { method: 'PUT', body });
      else     await apiFetch('/products', { method: 'POST', body });
      closeProductModal();
      loadProducts();
      toast(id ? 'Product updated' : 'Product added', 'success');
    } catch (err) { toast(err.message, 'error'); }
  });

  async function deleteProduct(id) {
    if (!confirm('Deactivate this product?')) return;
    try {
      await apiFetch(`/products/${id}`, { method: 'DELETE' });
      loadProducts();
      toast('Product deactivated', 'success');
    } catch (err) { toast(err.message, 'error'); }
  }

  // Restock modal
  function openRestock(id, name, stock) {
    document.getElementById('restock-product-id').value = id;
    document.getElementById('restock-product-name').textContent = name;
    document.getElementById('restock-qty').value = stock;
    document.getElementById('restock-modal').removeAttribute('hidden');
  }

  document.getElementById('save-restock').addEventListener('click', async () => {
    const id  = document.getElementById('restock-product-id').value;
    const qty = parseInt(document.getElementById('restock-qty').value);
    try {
      await apiFetch(`/products/${id}`, { method: 'PUT', body: { stock: qty } });
      closeRestockModal();
      loadProducts();
      toast('Stock updated', 'success');
    } catch (err) { toast(err.message, 'error'); }
  });

  document.getElementById('low-stock-btn').addEventListener('click', () => {
    showLowStockOnly = !showLowStockOnly;
    document.getElementById('low-stock-btn').textContent = showLowStockOnly ? '📦 All Products' : '⚠️ Low Stock';
    loadProducts();
  });

  document.getElementById('search').addEventListener('input', () => {
    clearTimeout(window._t);
    window._t = setTimeout(loadProducts, 300);
  });
  document.getElementById('category-filter').addEventListener('change', loadProducts);

  loadCategories().then(loadProducts);
</script>
</body>
</html>
