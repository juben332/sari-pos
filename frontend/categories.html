<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories — Sari POS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar">
    <div class="sidebar__brand">🛒 Sari POS</div>
    <nav class="sidebar__nav">
      <a href="/dashboard.html"    class="sidebar__link" data-page="dashboard"><span class="icon">🏠</span> Dashboard</a>
      <a href="/pos.html"          class="sidebar__link" data-page="pos"><span class="icon">🏪</span> POS / Sales</a>
      <a href="/returns.html"      class="sidebar__link" data-page="returns"><span class="icon">↩️</span> Returns</a>
      <a href="/transactions.html" class="sidebar__link" data-page="transactions"><span class="icon">📋</span> Transactions</a>
      <div data-admin hidden>
        <div class="sidebar__divider">Admin</div>
        <a href="/inventory.html"       class="sidebar__link" data-page="inventory"><span class="icon">📦</span> Inventory</a>
        <a href="/categories.html"      class="sidebar__link" data-page="categories"><span class="icon">🏷️</span> Categories</a>
        <a href="/stock-movements.html" class="sidebar__link" data-page="stock-movements"><span class="icon">📈</span> Stock History</a>
        <a href="/reports.html"         class="sidebar__link" data-page="reports"><span class="icon">📊</span> Reports</a>
        <a href="/staff.html"           class="sidebar__link" data-page="staff"><span class="icon">👥</span> Staff</a>
      </div>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user" data-user-name></div>
      <div data-user-role style="font-size:0.75rem;"></div>
      <button id="logout-btn" class="btn btn--outline btn--sm" style="margin-top:10px;width:100%;">Logout</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="topbar__menu-btn" id="sidebar-toggle">☰</button>
      <span class="topbar__title">Categories</span>
    </div>
    <div class="content">
      <div class="page-header">
        <h1 class="page-title">Product Categories</h1>
        <button class="btn btn--primary" id="add-btn">+ Add Category</button>
      </div>

      <div class="card" style="max-width:600px;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Category Name</th><th>Products</th><th>Created</th><th>Actions</th></tr>
            </thead>
            <tbody id="cat-tbody">
              <tr><td colspan="4" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Category Modal -->
<div class="modal-backdrop" id="cat-modal" hidden>
  <div class="modal" style="max-width:400px;">
    <div class="modal__header">
      <span class="modal__title" id="modal-title">Add Category</span>
      <button class="modal__close" id="close-modal">✕</button>
    </div>
    <form id="cat-form">
      <input type="hidden" id="cat-id" />
      <div class="form-group">
        <label class="form-label">Category Name *</label>
        <input type="text" id="cat-name" class="form-control" placeholder="e.g. Beverages, Snacks..." required />
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button type="button" class="btn btn--outline" id="cancel-modal">Cancel</button>
        <button type="submit" class="btn btn--primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  requireAuth('admin');
  initSidebar('categories');

  const catMap = new Map();

  async function loadCategories() {
    const [cats, products] = await Promise.all([
      apiFetch('/categories').catch(() => []),
      apiFetch('/products').catch(() => []),
    ]);

    // Count products per category
    const countMap = {};
    products.forEach(p => {
      if (p.category_id) countMap[p.category_id] = (countMap[p.category_id] || 0) + 1;
    });

    catMap.clear();
    cats.forEach(c => catMap.set(c.id, c));

    const tbody = document.getElementById('cat-tbody');
    if (!cats.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No categories yet — add one to organize your products</td></tr>';
      return;
    }

    tbody.innerHTML = cats.map(c => `
      <tr>
        <td><strong>🏷️ ${c.name}</strong></td>
        <td><span class="badge badge--blue">${countMap[c.id] || 0} products</span></td>
        <td style="color:var(--gray-400);font-size:0.82rem;">${new Date(c.created_at).toLocaleDateString('en-PH', { month:'short', day:'numeric', year:'numeric' })}</td>
        <td>
          <button class="btn btn--outline btn--sm" data-action="edit" data-id="${c.id}">Edit</button>
          <button class="btn btn--danger btn--sm" data-action="delete" data-id="${c.id}">Delete</button>
        </td>
      </tr>
    `).join('');

    tbody.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const c = catMap.get(btn.dataset.id);
        if (!c) return;
        if (btn.dataset.action === 'edit') openModal(c);
        else deleteCategory(c.id, c.name, countMap[c.id] || 0);
      });
    });
  }

  function openModal(cat = null) {
    document.getElementById('modal-title').textContent = cat ? 'Edit Category' : 'Add Category';
    document.getElementById('cat-id').value = cat?.id || '';
    document.getElementById('cat-name').value = cat?.name || '';
    document.getElementById('cat-modal').removeAttribute('hidden');
    setTimeout(() => document.getElementById('cat-name').focus(), 50);
  }

  function closeModal() { document.getElementById('cat-modal').setAttribute('hidden', ''); }

  document.getElementById('add-btn').addEventListener('click', () => openModal());
  document.getElementById('close-modal').addEventListener('click', closeModal);
  document.getElementById('cancel-modal').addEventListener('click', closeModal);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.getElementById('cat-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id   = document.getElementById('cat-id').value;
    const name = document.getElementById('cat-name').value.trim();
    if (!name) return;
    try {
      if (id) await apiFetch(`/categories/${id}`, { method: 'PUT', body: { name } });
      else     await apiFetch('/categories', { method: 'POST', body: { name } });
      closeModal();
      loadCategories();
      toast(id ? 'Category updated' : 'Category added', 'success');
    } catch (err) { toast(err.message, 'error'); }
  });

  async function deleteCategory(id, name, productCount) {
    if (productCount > 0) {
      if (!confirm(`"${name}" has ${productCount} product(s). Deleting it will unassign those products from this category. Continue?`)) return;
    } else {
      if (!confirm(`Delete category "${name}"?`)) return;
    }
    try {
      await apiFetch(`/categories/${id}`, { method: 'DELETE' });
      loadCategories();
      toast('Category deleted', 'success');
    } catch (err) { toast(err.message, 'error'); }
  }

  loadCategories();
</script>
</body>
</html>
