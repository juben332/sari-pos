<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS — Sari POS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar">
    <div class="sidebar__brand"><i data-lucide="store"></i> Sari POS</div>
    <nav class="sidebar__nav">
      <a href="/dashboard.html"    class="sidebar__link" data-page="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a href="/pos.html"          class="sidebar__link" data-page="pos"><i data-lucide="shopping-cart"></i> POS / Sales</a>
      <a href="/returns.html"      class="sidebar__link" data-page="returns"><i data-lucide="corner-up-left"></i> Returns</a>
      <a href="/transactions.html" class="sidebar__link" data-page="transactions"><i data-lucide="clipboard-list"></i> Transactions</a>
      <div data-admin hidden>
        <div class="sidebar__divider">Admin</div>
        <a href="/inventory.html"       class="sidebar__link" data-page="inventory"><i data-lucide="package"></i> Inventory</a>
        <a href="/categories.html"      class="sidebar__link" data-page="categories"><i data-lucide="tag"></i> Categories</a>
        <a href="/stock-movements.html" class="sidebar__link" data-page="stock-movements"><i data-lucide="trending-up"></i> Stock History</a>
        <a href="/reports.html"         class="sidebar__link" data-page="reports"><i data-lucide="bar-chart-2"></i> Reports</a>
        <a href="/staff.html"           class="sidebar__link" data-page="staff"><i data-lucide="users"></i> Staff</a>
      </div>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user" data-user-name></div>
      <div data-user-role style="font-size:0.75rem;"></div>
      <button id="logout-btn" class="btn btn--outline btn--sm" style="margin-top:10px;width:100%;">Logout</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="topbar__menu-btn" id="sidebar-toggle"><i data-lucide="menu"></i></button>
      <span class="topbar__title">Point of Sale</span>
      <div class="topbar__spacer"></div>
      <span id="clock" style="font-size:0.82rem;color:var(--gray-400);font-weight:500;"></span>
    </div>

    <!-- Mobile tab bar -->
    <div class="pos-tabs" id="pos-tabs">
      <button class="pos-tab active" id="tab-products">Products</button>
      <button class="pos-tab" id="tab-cart">Cart <span class="pos-tab__badge" id="cart-badge" hidden>0</span></button>
    </div>

    <div class="pos-page">
      <!-- LEFT: Products -->
      <div class="pos-left" id="pos-left">
        <div class="pos-search">
          <input type="text" id="search" class="form-control" placeholder="Search or scan barcode..." />
        </div>
        <div class="pos-cat-pills" id="cat-pills">
          <button class="cat-pill active" data-cat="">All</button>
        </div>
        <div class="product-grid" id="product-grid">
          <div class="empty-state">Loading products...</div>
        </div>
      </div>

      <!-- RIGHT: Cart -->
      <div class="pos-right" id="pos-right">
        <div class="pos-cart-header">
          <span class="pos-cart-title">Current Order</span>
          <button class="btn btn--outline btn--sm" id="clear-btn">Clear</button>
        </div>

        <div class="pos-cart-items" id="cart-list">
          <div class="cart-empty">Cart is empty</div>
        </div>

        <div class="pos-cart-totals">
          <div class="pos-totals-row">
            <span>Subtotal</span>
            <span id="subtotal">₱0.00</span>
          </div>
          <div class="pos-totals-row pos-totals-total">
            <span>TOTAL</span>
            <span id="total">₱0.00</span>
          </div>
        </div>

        <div class="pos-payment">
          <label class="pos-payment-label">Amount Tendered</label>
          <input type="number" id="cash-tendered" class="form-control" min="0" step="0.01" placeholder="0.00" />
          <div class="quick-cash">
            <button class="quick-cash-btn" data-amount="100">₱100</button>
            <button class="quick-cash-btn" data-amount="200">₱200</button>
            <button class="quick-cash-btn" data-amount="500">₱500</button>
            <button class="quick-cash-btn" data-amount="1000">₱1000</button>
          </div>
          <div class="pos-totals-row" style="margin-bottom:14px;">
            <span>Change</span>
            <span id="change-due" style="color:var(--green);font-weight:700;">₱0.00</span>
          </div>
          <button class="btn btn--primary btn--lg" id="process-btn" style="width:100%;" disabled>
            Process Payment
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Receipt Modal -->
<div class="modal-backdrop" id="receipt-modal" hidden>
  <div class="modal" style="max-width:360px;">
    <div class="modal__header">
      <span class="modal__title">Receipt</span>
      <button class="modal__close" id="close-receipt">✕</button>
    </div>
    <div id="receipt-body"></div>
    <button class="btn btn--primary" style="width:100%;margin-top:16px;" onclick="window.print()">Print</button>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  lucide.createIcons();
  const user = requireAuth();
  initSidebar('pos');

  let cart = [];
  let products = [];
  let activeCatId = '';

  // Clock
  setInterval(() => {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }, 1000);

  // Load categories → render pills
  async function loadCategories() {
    const cats = await apiFetch('/categories').catch(() => []);
    const pills = document.getElementById('cat-pills');
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'cat-pill';
      btn.dataset.cat = c.id;
      btn.textContent = c.name;
      btn.addEventListener('click', () => selectCat(c.id, btn));
      pills.appendChild(btn);
    });
  }

  function selectCat(id, btn) {
    activeCatId = id;
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    loadProducts();
  }

  document.querySelector('.cat-pill[data-cat=""]').addEventListener('click', function() {
    selectCat('', this);
  });

  // Load products
  async function loadProducts() {
    const search = document.getElementById('search').value.trim();
    const params = new URLSearchParams();
    if (search)       params.set('search', search);
    if (activeCatId)  params.set('category_id', activeCatId);

    const data = await apiFetch(`/products?${params}`).catch(() => []);
    products = data;
    renderGrid(data);
  }

  function renderGrid(list) {
    const grid = document.getElementById('product-grid');
    if (!list.length) { grid.innerHTML = '<div class="empty-state">No products found</div>'; return; }
    grid.innerHTML = list.map(p => {
      const outOfStock = p.stock === 0;
      const lowStock   = !outOfStock && p.stock <= p.low_stock_threshold;
      const cls = outOfStock ? 'product-card--out' : lowStock ? 'product-card--low' : '';
      return `
        <div class="product-card ${cls}" data-product-id="${p.id}" ${outOfStock ? 'aria-disabled="true"' : ''}>
          <div class="product-card__name">${p.name}</div>
          ${p.categories?.name ? `<div class="product-card__cat">${p.categories.name}</div>` : ''}
          <div class="product-card__price">₱${parseFloat(p.price).toFixed(2)}</div>
          <div class="product-card__stock">${outOfStock ? 'Out of stock' : `Stock: ${p.stock}`}</div>
        </div>
      `;
    }).join('');

    grid.querySelectorAll('.product-card:not(.product-card--out)').forEach(card => {
      card.addEventListener('click', () => addToCart(card.dataset.productId));
    });
  }

  function addToCart(productId) {
    const p = products.find(x => x.id === productId);
    if (!p) return;
    const existing = cart.find(i => i.product_id === productId);
    if (existing) {
      if (existing.quantity >= p.stock) { toast('Insufficient stock', 'error'); return; }
      existing.quantity++;
    } else {
      if (p.stock === 0) { toast('Out of stock', 'error'); return; }
      cart.push({ product_id: p.id, name: p.name, price: parseFloat(p.price), quantity: 1, stock: p.stock });
    }
    renderCart();
  }

  function updateCartBadge() {
    const count = cart.reduce((s, i) => s + i.quantity, 0);
    const badge = document.getElementById('cart-badge');
    if (count > 0) { badge.textContent = count; badge.removeAttribute('hidden'); }
    else badge.setAttribute('hidden', '');
  }

  function renderCart() {
    const list = document.getElementById('cart-list');
    if (!cart.length) {
      list.innerHTML = '<div class="cart-empty">Cart is empty</div>';
    } else {
      list.innerHTML = cart.map((item, i) => `
        <div class="cart-item">
          <div class="cart-item__info">
            <div class="cart-item__name">${item.name}</div>
            <div class="cart-item__unit">₱${item.price.toFixed(2)} each</div>
          </div>
          <div class="cart-item__qty">
            <button data-action="dec" data-index="${i}">−</button>
            <span>${item.quantity}</span>
            <button data-action="inc" data-index="${i}">+</button>
          </div>
          <div class="cart-item__price">₱${(item.price * item.quantity).toFixed(2)}</div>
          <button class="cart-item__remove" data-action="remove" data-index="${i}">✕</button>
        </div>
      `).join('');

      list.querySelectorAll('button[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = parseInt(btn.dataset.index);
          if (btn.dataset.action === 'dec') changeQty(i, -1);
          else if (btn.dataset.action === 'inc') changeQty(i, 1);
          else removeItem(i);
        });
      });
    }
    updateTotals();
    updateCartBadge();
  }

  function changeQty(i, delta) {
    cart[i].quantity += delta;
    if (cart[i].quantity <= 0) cart.splice(i, 1);
    else if (cart[i].quantity > cart[i].stock) { cart[i].quantity = cart[i].stock; toast('Max stock reached', 'info'); }
    renderCart();
  }

  function removeItem(i) { cart.splice(i, 1); renderCart(); }

  function updateTotals() {
    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    const cash  = parseFloat(document.getElementById('cash-tendered').value) || 0;
    document.getElementById('subtotal').textContent    = `₱${total.toFixed(2)}`;
    document.getElementById('total').textContent       = `₱${total.toFixed(2)}`;
    document.getElementById('change-due').textContent  = `₱${Math.max(0, cash - total).toFixed(2)}`;
    document.getElementById('process-btn').disabled    = cart.length === 0 || cash < total;
  }

  document.getElementById('cash-tendered').addEventListener('input', updateTotals);

  // Quick cash buttons
  document.querySelectorAll('.quick-cash-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('cash-tendered').value = btn.dataset.amount;
      updateTotals();
    });
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    if (!cart.length) return;
    if (!confirm('Clear all items from the cart?')) return;
    cart = [];
    document.getElementById('cash-tendered').value = '';
    renderCart();
  });

  document.getElementById('process-btn').addEventListener('click', async () => {
    const btn = document.getElementById('process-btn');
    btn.disabled = true;
    btn.textContent = 'Processing...';
    try {
      const data = await apiFetch('/transactions', {
        method: 'POST',
        body: {
          items: cart.map(i => ({ product_id: i.product_id, quantity: i.quantity })),
          discount_type: 'none',
          cash_tendered: parseFloat(document.getElementById('cash-tendered').value),
        },
      });
      showReceipt(data);
      cart = [];
      document.getElementById('cash-tendered').value = '';
      renderCart();
      loadProducts();
      switchTab('products');
      toast('Sale processed!', 'success');
    } catch (err) {
      toast(err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Process Payment';
    }
  });

  function showReceipt(txn) {
    const el = document.getElementById('receipt-body');
    const items = txn.items || [];
    el.innerHTML = `
      <div style="text-align:center;margin-bottom:12px;">
        <strong>Sari POS</strong><br>
        <small>${new Date(txn.created_at).toLocaleString()}</small><br>
        <small>Ref: ${txn.reference_no}</small>
      </div>
      <table style="width:100%;font-size:0.8rem;">
        <thead><tr><th>Item</th><th>Qty</th><th>Amount</th></tr></thead>
        <tbody>${items.map(i => `<tr><td>${i.product_name}</td><td>${i.quantity}</td><td>₱${parseFloat(i.subtotal).toFixed(2)}</td></tr>`).join('')}</tbody>
      </table>
      <div style="margin-top:12px;font-size:0.85rem;">
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1rem;margin-bottom:6px;"><span>TOTAL</span><span>₱${parseFloat(txn.total).toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;"><span>Cash</span><span>₱${parseFloat(txn.cash_tendered).toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;color:#16a34a;font-weight:700;"><span>Change</span><span>₱${parseFloat(txn.change_due).toFixed(2)}</span></div>
      </div>
    `;
    document.getElementById('receipt-modal').removeAttribute('hidden');
  }

  document.getElementById('close-receipt').addEventListener('click', () => {
    document.getElementById('receipt-modal').setAttribute('hidden', '');
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('receipt-modal').setAttribute('hidden', '');
  });

  // Barcode search
  document.getElementById('search').addEventListener('keydown', async e => {
    if (e.key === 'Enter') {
      const val = e.target.value.trim();
      if (!val) return;
      try {
        const p = await apiFetch(`/products/barcode/${encodeURIComponent(val)}`);
        addToCart(p.id);
        e.target.value = '';
        loadProducts();
      } catch { loadProducts(); }
    } else {
      clearTimeout(window._st);
      window._st = setTimeout(loadProducts, 300);
    }
  });

  // Mobile tab switcher
  const posLeft  = document.getElementById('pos-left');
  const posRight = document.getElementById('pos-right');

  function switchTab(tab) {
    if (window.innerWidth > 768) return;
    const toProducts = tab === 'products';
    document.getElementById('tab-products').classList.toggle('active', toProducts);
    document.getElementById('tab-cart').classList.toggle('active', !toProducts);
    posLeft.style.display  = toProducts ? '' : 'none';
    posRight.style.display = toProducts ? 'none' : '';
  }

  document.getElementById('tab-products').addEventListener('click', () => switchTab('products'));
  document.getElementById('tab-cart').addEventListener('click',     () => switchTab('cart'));
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) { posLeft.style.display = ''; posRight.style.display = ''; }
  });

  loadCategories();
  loadProducts();
</script>
</body>
</html>
