<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS — Sari POS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar">
    <div class="sidebar__brand"><i data-lucide="store"></i> Sari POS</div>
    <nav class="sidebar__nav">
      <a href="/dashboard.html"    class="sidebar__link" data-page="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a href="/pos.html"          class="sidebar__link" data-page="pos"><i data-lucide="shopping-cart"></i> POS / Sales</a>
      <a href="/returns.html"      class="sidebar__link" data-page="returns"><i data-lucide="corner-up-left"></i> Returns</a>
      <a href="/transactions.html" class="sidebar__link" data-page="transactions"><i data-lucide="clipboard-list"></i> Transactions</a>
      <div data-admin hidden>
        <div class="sidebar__divider">Admin</div>
        <a href="/inventory.html"       class="sidebar__link" data-page="inventory"><i data-lucide="package"></i> Inventory</a>
        <a href="/categories.html"      class="sidebar__link" data-page="categories"><i data-lucide="tag"></i> Categories</a>
        <a href="/stock-movements.html" class="sidebar__link" data-page="stock-movements"><i data-lucide="trending-up"></i> Stock History</a>
        <a href="/reports.html"         class="sidebar__link" data-page="reports"><i data-lucide="bar-chart-2"></i> Reports</a>
        <a href="/staff.html"           class="sidebar__link" data-page="staff"><i data-lucide="users"></i> Staff</a>
      </div>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user" data-user-name></div>
      <div data-user-role style="font-size:0.75rem;"></div>
      <button id="logout-btn" class="btn btn--outline btn--sm" style="margin-top:10px;width:100%;">Logout</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="topbar__menu-btn" id="sidebar-toggle"><i data-lucide="menu"></i></button>
      <span class="topbar__title">Point of Sale</span>
      <div class="topbar__spacer"></div>
      <span id="clock" style="font-size:0.82rem;color:var(--gray-400);font-weight:500;"></span>
    </div>

    <div class="pos-layout">
      <!-- LEFT: Products -->
      <div class="pos-left">
        <div class="pos-search-bar">
          <input type="text" id="search" class="form-control" placeholder="Search or scan barcode..." />
          <div class="pos-category-tabs" id="cat-pills">
            <button class="pos-cat-tab pos-cat-tab--active" data-cat="">All</button>
          </div>
        </div>
        <div class="pos-product-grid" id="product-grid">
          <div class="pos-empty">Loading products...</div>
        </div>
      </div>

      <!-- Cart overlay (mobile) -->
      <div class="pos-cart-overlay" id="cart-overlay"></div>

      <!-- FAB (mobile only) -->
      <button class="pos-cart-fab" id="cart-fab" aria-label="View cart">
        <span class="pos-cart-fab__label">
          <i data-lucide="shopping-cart" style="width:18px;height:18px;"></i>
          View Cart <span class="pos-cart-fab__count" id="fab-count">0 items</span>
        </span>
        <span class="pos-cart-fab__total" id="fab-total">₱0.00</span>
      </button>

      <!-- RIGHT: Cart + Payment -->
      <div class="pos-right" id="cart-panel">
        <div class="pos-cart">
          <div class="pos-cart__handle" id="cart-handle">
            <div class="pos-cart__handle-bar"></div>
          </div>
          <div class="pos-cart__header">
            <h3>Current Order</h3>
            <div style="display:flex;align-items:center;gap:8px;">
              <button class="btn btn--outline btn--sm" id="clear-btn">Clear</button>
              <button class="pos-cart__close-btn" id="close-cart-btn" aria-label="Close cart">✕</button>
            </div>
          </div>

          <div class="pos-cart__items" id="cart-list">
            <div class="pos-cart__empty">
              <i data-lucide="shopping-cart" style="width:36px;height:36px;stroke-width:1.5;"></i>
              Tap a product to add it
            </div>
          </div>

          <div class="pos-cart__totals">
            <div class="pos-totals-row">
              <span>Subtotal</span>
              <span id="subtotal">₱0.00</span>
            </div>
            <div class="pos-totals-row pos-totals-row--total">
              <span>TOTAL</span>
              <span id="total">₱0.00</span>
            </div>
          </div>

          <div class="pos-payment">
            <label class="form-label">Amount Tendered</label>
            <input type="number" id="cash-tendered" class="form-control" min="0" step="0.01" placeholder="0.00" />
            <div class="pos-quick-cash">
              <button class="btn btn--outline btn--sm pos-quick-btn" data-amount="100">₱100</button>
              <button class="btn btn--outline btn--sm pos-quick-btn" data-amount="200">₱200</button>
              <button class="btn btn--outline btn--sm pos-quick-btn" data-amount="500">₱500</button>
              <button class="btn btn--outline btn--sm pos-quick-btn" data-amount="1000">₱1000</button>
            </div>
            <div class="pos-totals-row">
              <span>Change</span>
              <span id="change-due" class="pos-change">₱0.00</span>
            </div>
          </div>

          <div style="padding:0 14px 16px;">
            <button class="btn btn--primary btn--lg" id="process-btn" style="width:100%;" disabled>
              Process Payment
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Receipt Modal -->
<div class="modal-backdrop" id="receipt-modal" hidden>
  <div class="modal" style="max-width:360px;">
    <div class="modal__header">
      <span class="modal__title">Receipt</span>
      <button class="modal__close" id="close-receipt">✕</button>
    </div>
    <div id="receipt-body"></div>
    <button class="btn btn--primary" style="width:100%;margin-top:16px;" onclick="window.print()">Print</button>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  lucide.createIcons();
  const user = requireAuth();
  initSidebar('pos');

  let cart = [];
  let products = [];
  let activeCatId = '';

  // Clock
  setInterval(() => {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }, 1000);

  // ── Categories ─────────────────────────────────────────────────────────────
  async function loadCategories() {
    const cats = await apiFetch('/categories').catch(() => []);
    const pills = document.getElementById('cat-pills');
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'pos-cat-tab';
      btn.dataset.cat = c.id;
      btn.textContent = c.name;
      btn.addEventListener('click', () => selectCat(c.id, btn));
      pills.appendChild(btn);
    });
  }

  function selectCat(id, btn) {
    activeCatId = id;
    document.querySelectorAll('.pos-cat-tab').forEach(p => p.classList.remove('pos-cat-tab--active'));
    btn.classList.add('pos-cat-tab--active');
    loadProducts();
  }

  document.querySelector('.pos-cat-tab[data-cat=""]').addEventListener('click', function() {
    selectCat('', this);
  });

  // ── Products ───────────────────────────────────────────────────────────────
  async function loadProducts() {
    const search = document.getElementById('search').value.trim();
    const params = new URLSearchParams();
    if (search)      params.set('search', search);
    if (activeCatId) params.set('category_id', activeCatId);
    const data = await apiFetch(`/products?${params}`).catch(() => []);
    products = data;
    renderGrid(data);
  }

  function renderGrid(list) {
    const grid = document.getElementById('product-grid');
    if (!list.length) { grid.innerHTML = '<div class="pos-empty">No products found</div>'; return; }
    grid.innerHTML = list.map(p => {
      const outOfStock = p.stock === 0;
      const isLow      = !outOfStock && p.stock <= p.low_stock_threshold;
      const cartItem   = cart.find(i => i.product_id === p.id);
      const inCart     = !!cartItem;
      return `
        <div class="pos-product-card ${inCart ? 'pos-product-card--in-cart' : ''} ${outOfStock ? 'pos-product-card--out' : ''}"
             data-product-id="${p.id}" ${outOfStock ? 'aria-disabled="true"' : ''}>
          <div class="pos-product-card__header">
            <div class="pos-product-card__name">${p.name}</div>
            ${inCart ? `<div class="pos-product-card__badge">${cartItem.quantity}</div>` : ''}
          </div>
          ${p.categories?.name ? `<div class="pos-product-card__cat">${p.categories.name}</div>` : ''}
          <div class="pos-product-card__footer">
            <div class="pos-product-card__price">₱${parseFloat(p.price).toFixed(2)}</div>
            <div class="pos-product-card__stock ${isLow ? 'low' : ''}">${outOfStock ? 'Out of stock' : `${p.stock} left`}</div>
          </div>
        </div>
      `;
    }).join('');

    grid.querySelectorAll('.pos-product-card:not(.pos-product-card--out)').forEach(card => {
      card.addEventListener('click', () => addToCart(card.dataset.productId));
    });
  }

  function updateCardStates() {
    document.querySelectorAll('.pos-product-card[data-product-id]').forEach(card => {
      const cartItem = cart.find(x => x.product_id === card.dataset.productId);
      const inCart = !!cartItem;
      card.classList.toggle('pos-product-card--in-cart', inCart);
      const header = card.querySelector('.pos-product-card__header');
      let badge = card.querySelector('.pos-product-card__badge');
      if (inCart) {
        if (!badge) {
          badge = document.createElement('div');
          badge.className = 'pos-product-card__badge';
          header.appendChild(badge);
        }
        badge.textContent = cartItem.quantity;
      } else if (badge) {
        badge.remove();
      }
    });
  }

  // ── Cart ───────────────────────────────────────────────────────────────────
  function addToCart(productId) {
    const p = products.find(x => x.id === productId);
    if (!p) return;
    const existing = cart.find(i => i.product_id === productId);
    if (existing) {
      if (existing.quantity >= p.stock) { toast('Insufficient stock', 'error'); return; }
      existing.quantity++;
    } else {
      if (p.stock === 0) { toast('Out of stock', 'error'); return; }
      cart.push({ product_id: p.id, name: p.name, price: parseFloat(p.price), quantity: 1, stock: p.stock });
    }
    renderCart();
    updateCardStates();
  }

  function renderCart() {
    const list = document.getElementById('cart-list');
    if (!cart.length) {
      list.innerHTML = `
        <div class="pos-cart__empty">
          <i data-lucide="shopping-cart" style="width:36px;height:36px;stroke-width:1.5;"></i>
          Tap a product to add it
        </div>`;
      lucide.createIcons();
    } else {
      list.innerHTML = cart.map((item, i) => `
        <div class="pos-cart-item">
          <div class="pos-cart-item__name">${item.name}</div>
          <div class="pos-cart-item__subtotal">₱${(item.price * item.quantity).toFixed(2)}</div>
          <div class="pos-cart-item__row2">
            <span class="pos-cart-item__unit">₱${item.price.toFixed(2)} each</span>
            <button class="qty-btn qty-btn--remove" data-action="dec" data-index="${i}">−</button>
            <span class="qty-value">${item.quantity}</span>
            <button class="qty-btn" data-action="inc" data-index="${i}">+</button>
            <button class="remove-btn" data-action="remove" data-index="${i}" title="Remove">
              <i data-lucide="x" style="width:14px;height:14px;stroke-width:2.5;pointer-events:none;"></i>
            </button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();

      list.querySelectorAll('button[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = parseInt(btn.dataset.index);
          if (btn.dataset.action === 'dec') changeQty(i, -1);
          else if (btn.dataset.action === 'inc') changeQty(i, 1);
          else removeItem(i);
        });
      });
    }
    updateTotals();
  }

  function changeQty(i, delta) {
    cart[i].quantity += delta;
    if (cart[i].quantity <= 0) cart.splice(i, 1);
    else if (cart[i].quantity > cart[i].stock) { cart[i].quantity = cart[i].stock; toast('Max stock reached', 'info'); }
    renderCart();
    updateCardStates();
  }

  function removeItem(i) { cart.splice(i, 1); renderCart(); updateCardStates(); }

  function updateTotals() {
    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    const cash  = parseFloat(document.getElementById('cash-tendered').value) || 0;
    const totalQty = cart.reduce((s, i) => s + i.quantity, 0);

    document.getElementById('subtotal').textContent   = `₱${total.toFixed(2)}`;
    document.getElementById('total').textContent      = `₱${total.toFixed(2)}`;
    document.getElementById('change-due').textContent = `₱${Math.max(0, cash - total).toFixed(2)}`;
    document.getElementById('process-btn').disabled   = cart.length === 0 || cash < total;

    document.getElementById('fab-count').textContent = totalQty === 1 ? '1 item' : `${totalQty} items`;
    document.getElementById('fab-total').textContent = `₱${total.toFixed(2)}`;
  }

  document.getElementById('cash-tendered').addEventListener('input', updateTotals);

  document.querySelectorAll('.pos-quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('cash-tendered').value = btn.dataset.amount;
      updateTotals();
    });
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    if (!cart.length) return;
    if (!confirm('Clear all items from the cart?')) return;
    cart = [];
    document.getElementById('cash-tendered').value = '';
    renderCart();
    updateCardStates();
  });

  document.getElementById('process-btn').addEventListener('click', async () => {
    const btn = document.getElementById('process-btn');
    btn.disabled = true;
    btn.textContent = 'Processing...';
    try {
      const data = await apiFetch('/transactions', {
        method: 'POST',
        body: {
          items: cart.map(i => ({ product_id: i.product_id, quantity: i.quantity })),
          discount_type: 'none',
          cash_tendered: parseFloat(document.getElementById('cash-tendered').value),
        },
      });
      showReceipt(data);
      cart = [];
      document.getElementById('cash-tendered').value = '';
      renderCart();
      updateCardStates();
      loadProducts();
      closeCart();
      toast('Sale processed!', 'success');
    } catch (err) {
      toast(err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Process Payment';
    }
  });

  // ── Receipt ────────────────────────────────────────────────────────────────
  function showReceipt(txn) {
    const el = document.getElementById('receipt-body');
    const items = txn.items || [];
    el.innerHTML = `
      <div style="text-align:center;margin-bottom:12px;">
        <strong>Sari POS</strong><br>
        <small>${new Date(txn.created_at).toLocaleString()}</small><br>
        <small>Ref: ${txn.reference_no}</small>
      </div>
      <table style="width:100%;font-size:0.8rem;">
        <thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead>
        <tbody>${items.map(i => `<tr><td>${i.product_name}</td><td>${i.quantity}</td><td>₱${parseFloat(i.subtotal).toFixed(2)}</td></tr>`).join('')}</tbody>
      </table>
      <div style="margin-top:12px;font-size:0.85rem;">
        <div style="display:flex;justify-content:space-between;font-weight:700;"><span>TOTAL</span><span>₱${parseFloat(txn.total).toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;"><span>Cash</span><span>₱${parseFloat(txn.cash_tendered).toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;color:#16a34a;font-weight:600;"><span>Change</span><span>₱${parseFloat(txn.change_due).toFixed(2)}</span></div>
      </div>
    `;
    document.getElementById('receipt-modal').removeAttribute('hidden');
  }

  document.getElementById('close-receipt').addEventListener('click', () => {
    document.getElementById('receipt-modal').setAttribute('hidden', '');
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('receipt-modal').setAttribute('hidden', '');
  });

  // ── Barcode search ─────────────────────────────────────────────────────────
  document.getElementById('search').addEventListener('keydown', async e => {
    if (e.key === 'Enter') {
      const val = e.target.value.trim();
      if (!val) return;
      try {
        const p = await apiFetch(`/products/barcode/${encodeURIComponent(val)}`);
        addToCart(p.id);
        e.target.value = '';
        loadProducts();
      } catch { loadProducts(); }
    } else {
      clearTimeout(window._st);
      window._st = setTimeout(loadProducts, 300);
    }
  });

  // ── Mobile cart drawer ─────────────────────────────────────────────────────
  const cartPanel  = document.getElementById('cart-panel');
  const cartOverlay = document.getElementById('cart-overlay');
  const cartFab    = document.getElementById('cart-fab');

  function openCart() {
    cartPanel.classList.add('cart-open');
    cartOverlay.classList.add('pos-cart-overlay--show');
    document.body.style.overscrollBehaviorY = 'contain';
  }

  function closeCart() {
    cartPanel.style.transform = '';
    cartPanel.classList.remove('cart-open', 'cart-dragging');
    cartOverlay.classList.remove('pos-cart-overlay--show');
    document.body.style.overscrollBehaviorY = '';
  }

  cartFab.addEventListener('click', openCart);
  cartOverlay.addEventListener('click', closeCart);
  document.getElementById('close-cart-btn').addEventListener('click', closeCart);

  // Swipe-to-dismiss
  (function() {
    const handle = document.getElementById('cart-handle');
    let startY = 0, dragging = false;
    const THRESHOLD = 120;

    handle.addEventListener('touchstart', e => {
      if (!cartPanel.classList.contains('cart-open')) return;
      startY = e.touches[0].clientY;
      dragging = true;
      cartPanel.classList.add('cart-dragging');
    }, { passive: true });

    handle.addEventListener('touchmove', e => {
      if (!dragging) return;
      const dy = e.touches[0].clientY - startY;
      if (dy < 0) return;
      e.preventDefault();
      cartPanel.style.transform = `translateY(${dy}px)`;
      cartOverlay.style.opacity = 1 - Math.min(dy / THRESHOLD, 1) * 0.7;
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (!dragging) return;
      dragging = false;
      cartPanel.classList.remove('cart-dragging');
      cartOverlay.style.opacity = '';
      const dy = e.changedTouches[0].clientY - startY;
      if (dy > THRESHOLD) {
        cartPanel.style.transition = 'transform 0.25s ease';
        cartPanel.style.transform = 'translateY(100%)';
        setTimeout(closeCart, 260);
      } else {
        cartPanel.style.transform = '';
      }
    }, { passive: true });
  })();

  // ── Init ───────────────────────────────────────────────────────────────────
  loadCategories();
  loadProducts();
</script>
</body>
</html>
