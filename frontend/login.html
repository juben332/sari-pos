<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sari POS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-card__logo">
      <h1>🛒 Sari POS</h1>
      <p>Sari-Sari Store Point of Sale</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required />
      </div>
      <p id="error-msg" style="color:#dc2626;font-size:0.85rem;margin-bottom:12px;display:none;"></p>
      <button type="submit" class="btn btn--primary" style="width:100%;" id="login-btn">Sign In</button>
    </form>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (getUser() && getToken()) window.location.href = '/pos.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.style.display = 'none';

    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: { email: document.getElementById('email').value, password: document.getElementById('password').value },
      });
      setSession(data.access_token, data.refresh_token, data.user);
      window.location.href = '/pos.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
