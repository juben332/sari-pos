<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sari POS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-card__logo">
      <h1>🛒 Sari POS</h1>
      <p>Sari-Sari Store Point of Sale</p>
    </div>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <div id="error-alert" class="alert alert--error" style="display:none;margin-bottom:12px;"></div>
      <button type="submit" class="btn btn--primary" style="width:100%;" id="login-btn">Sign In</button>
    </form>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  if (getUser() && getToken()) window.location.href = '/dashboard.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-alert');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.style.display = 'none';

    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: { email: document.getElementById('email').value, password: document.getElementById('password').value },
      });
      setSession(data.access_token, data.refresh_token, data.user);
      window.location.href = '/dashboard.html';
    } catch (err) {
      errEl.textContent = err.message || 'Invalid email or password';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
      document.getElementById('password').select();
    }
  });

  // Allow Enter key on inputs
  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });
</script>
</body>
</html>
